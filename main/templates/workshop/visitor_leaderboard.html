{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Workshop Leaderboard - {{ workshop.workshop_name }}</title>
    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,600,700" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        body { background-color: #4e73df; color: white; }
        .leaderboard-container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .card { color: #5a5c69; }
        .rank-badge { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .rank-1 { background-color: #f6c23e; color: white; }
        .rank-2 { background-color: #858796; color: white; }
        .rank-3 { background-color: #e74a3b; color: white; }
        .rank-other { background-color: #eaecf4; color: #858796; }
    </style>
</head>
<body>
    <div class="container leaderboard-container">
        <div class="text-center mb-4">
            {% if workshop.workshop_logo %}
                <img src="{{ workshop.workshop_logo.url }}" alt="Logo" style="max-height: 80px; filter: brightness(0) invert(1);" class="mb-3">
            {% endif %}
            <h2 class="h4 font-weight-bold text-white">{{ workshop.workshop_name }}</h2>
            <p class="text-white-50">Top 10 Participants</p>
        </div>

        <div class="card shadow-lg mb-4">
            <div class="card-body p-0">
                <div id="leaderboard-list">
                    <!-- Data will be loaded via AJAX -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="sr-only">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header py-3 bg-light">
                <h6 class="m-0 font-weight-bold text-primary">Earn Points!</h6>
            </div>
            <div class="card-body py-2">
                <div class="d-flex justify-content-between small mb-1">
                    <span>Attend Workshop</span>
                    <span class="font-weight-bold text-success">+10 pts</span>
                </div>
                <div class="d-flex justify-content-between small mb-1">
                    <span>Give Feedback</span>
                    <span class="font-weight-bold text-success">+5 pts</span>
                </div>
                <div class="d-flex justify-content-between small">
                    <span>Vote in Polls</span>
                    <span class="font-weight-bold text-success">+3 pts</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const workshopUuid = "{{ workshop.workshop_uuid }}";

        function updateLeaderboard() {
            $.getJSON(`/api/leaderboard/${workshopUuid}/`, function(data) {
                const list = $('#leaderboard-list');
                list.empty();
                
                if (data.leaderboard.length === 0) {
                    list.append('<div class="p-5 text-center">Join the workshop and participate to see your name here!</div>');
                } else {
                    data.leaderboard.forEach(entry => {
                        let rankClass = 'rank-other';
                        if (entry.rank === 1) rankClass = 'rank-1';
                        else if (entry.rank === 2) rankClass = 'rank-2';
                        else if (entry.rank === 3) rankClass = 'rank-3';

                        list.append(`
                            <div class="d-flex align-items-center p-3 border-bottom">
                                <div class="rank-badge ${rankClass} mr-3">${entry.rank}</div>
                                <div class="flex-grow-1">
                                    <div class="font-weight-bold">${entry.name}</div>
                                </div>
                                <div class="font-weight-bold text-primary">${entry.points} pts</div>
                            </div>
                        `);
                    });
                }
            });
        }

        updateLeaderboard();
        setInterval(updateLeaderboard, 10000); // 10s refresh for visitors
    </script>
</body>
</html>

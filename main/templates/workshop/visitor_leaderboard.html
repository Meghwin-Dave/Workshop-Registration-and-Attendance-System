{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Leaderboard | {{ workshop.workshop_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .rank-glow-1 { box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        .rank-glow-2 { box-shadow: 0 0 20px rgba(148, 163, 184, 0.2); }
        .rank-glow-3 { box-shadow: 0 0 20px rgba(180, 83, 9, 0.2); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 flex flex-col items-center">
    
    <div class="max-w-2xl w-full space-y-8" x-data="{ 
        leaderboard: [],
        loading: true,
        lastUpdated: '',
        
        fetchData() {
            fetch(`/api/leaderboard/{{ workshop.workshop_uuid }}/`)
                .then(r => r.json())
                .then(data => {
                    this.leaderboard = data.leaderboard;
                    this.loading = false;
                    this.lastUpdated = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                });
        }
    }" x-init="fetchData(); setInterval(() => fetchData(), 10000)">

        <!-- Header -->
        <div class="text-center space-y-4">
            {% if workshop.workshop_logo %}
                <img src="/media/{{ workshop_logo }}" alt="Logo" class="h-16 mx-auto brightness-0 invert opacity-90">
            {% else %}
                <div class="w-16 h-16 bg-primary-600 rounded-3xl flex items-center justify-center mx-auto shadow-2xl shadow-primary-500/20">
                    <i data-lucide="trophy" class="w-8 h-8 text-white"></i>
                </div>
            {% endif %}
            
            <div class="space-y-1">
                <h1 class="text-3xl font-extrabold text-white tracking-tight">{{ workshop.workshop_name }}</h1>
                <p class="text-slate-400 font-medium flex items-center justify-center">
                    Live Leaderboard 
                    <span class="mx-2 text-slate-700">•</span> 
                    <span class="text-xs uppercase tracking-widest text-primary-400 px-2 py-0.5 bg-primary-500/10 rounded-full">Real-time</span>
                </p>
            </div>
        </div>

        <!-- Leaderboard Card -->
        <div class="bg-slate-800/50 backdrop-blur-xl rounded-[2.5rem] border border-slate-700/50 shadow-2xl overflow-hidden min-h-[500px]">
            <!-- List Header -->
            <div class="px-8 py-6 border-b border-slate-700/50 flex items-center justify-between bg-slate-800/80">
                <h3 class="text-lg font-bold text-white">Top 10 Participants</h3>
                <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center">
                    <i data-lucide="refresh-cw" class="w-3 h-3 mr-2 animate-spin-slow"></i>
                    Updated: <span x-text="lastUpdated" class="ml-1 text-slate-400"></span>
                </div>
            </div>

            <!-- List Body -->
            <div class="p-4 space-y-3">
                <template x-if="loading">
                    <div class="py-20 flex flex-col items-center space-y-4">
                        <div class="w-12 h-12 border-4 border-slate-700 border-t-primary-500 rounded-full animate-spin"></div>
                        <p class="text-slate-500 text-sm font-medium">Crunching the scores...</p>
                    </div>
                </template>

                <template x-if="!loading && leaderboard.length === 0">
                    <div class="py-20 text-center space-y-4">
                        <i data-lucide="users" class="w-12 h-12 text-slate-700 mx-auto"></i>
                        <p class="text-slate-500 italic">No points recorded yet. Be the first to join!</p>
                    </div>
                </template>

                <template x-for="user in leaderboard" :key="user.rank">
                    <div class="relative group p-4 rounded-2xl transition-all duration-300 flex items-center justify-between"
                         :class="{
                            'bg-amber-500/10 border border-amber-500/20 rank-glow-1': user.rank === 1,
                            'bg-slate-400/5 border border-slate-400/20': user.rank === 2,
                            'bg-orange-900/10 border border-orange-900/20': user.rank === 3,
                            'bg-slate-800/30 border border-transparent': user.rank > 3
                         }">
                        
                        <div class="flex items-center space-x-6">
                            <!-- Rank Badge -->
                            <div class="w-10 h-10 flex-shrink-0 flex items-center justify-center rounded-xl font-black text-lg"
                                 :class="{
                                    'bg-amber-500 text-white shadow-lg shadow-amber-500/30': user.rank === 1,
                                    'bg-slate-400 text-slate-900 shadow-lg shadow-slate-400/30': user.rank === 2,
                                    'bg-amber-800 text-amber-100 shadow-lg shadow-amber-800/30': user.rank === 3,
                                    'bg-slate-700 text-slate-400': user.rank > 3
                                 }">
                                <template x-if="user.rank === 1"><i data-lucide="crown" class="w-6 h-6"></i></template>
                                <template x-if="user.rank !== 1"><span x-text="user.rank"></span></template>
                            </div>

                            <!-- Name -->
                            <div>
                                <div class="text-base font-bold text-white group-hover:text-primary-400 transition-colors" x-text="user.name"></div>
                                <div class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mt-0.5" x-text="user.rank === 1 ? 'Current Champion' : 'Participant'"></div>
                            </div>
                        </div>

                        <!-- Points -->
                        <div class="flex items-center space-x-3">
                            <div class="text-right">
                                <div class="text-xl font-black text-white" x-text="user.points"></div>
                                <div class="text-[10px] uppercase font-semibold text-slate-500">Points</div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Rules / Points Info -->
        <div class="grid grid-cols-3 gap-4">
            <div class="p-4 rounded-3xl bg-slate-800/40 border border-slate-700/50 flex flex-col items-center text-center space-y-2">
                <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg">
                    <i data-lucide="calendar-check" class="w-4 h-4"></i>
                </div>
                <div class="text-white text-xs font-bold">+10</div>
                <div class="text-[9px] text-slate-500 uppercase font-black">Attend</div>
            </div>
            <div class="p-4 rounded-3xl bg-slate-800/40 border border-slate-700/50 flex flex-col items-center text-center space-y-2">
                <div class="p-2 bg-amber-500/10 text-amber-400 rounded-lg">
                    <i data-lucide="message-square" class="w-4 h-4"></i>
                </div>
                <div class="text-white text-xs font-bold">+5</div>
                <div class="text-[9px] text-slate-500 uppercase font-black">Feedback</div>
            </div>
            <div class="p-4 rounded-3xl bg-slate-800/40 border border-slate-700/50 flex flex-col items-center text-center space-y-2">
                <div class="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg">
                    <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                </div>
                <div class="text-white text-xs font-bold">+3</div>
                <div class="text-[9px] text-slate-500 uppercase font-black">Polls</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Feedback | {{ workshop.workshop_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-indigo-600 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full" x-data="{ 
        step: 1, 
        totalSteps: 4,
        submitted: {% if feedback_submitted %}true{% else %}false{% endif %},
        q3_stars: 0,
        q5_level: '',
        q7_scale: '',
        
        setQ3(val) { this.q3_stars = val; document.getElementById('q3_val').value = val; },
        setQ5(val) { this.q5_level = val; document.getElementById('q5_val').value = val; },
        setQ7(val) { this.q7_scale = val; document.getElementById('q7_val').value = val; }
    }" 
    x-init="lucide.createIcons(); $watch('step', () => { $nextTick(() => lucide.createIcons()) })"
    x-cloak>

        <!-- Success Message -->
        <template x-if="submitted">
            <div class="bg-white rounded-[2.5rem] p-12 shadow-2xl text-center space-y-6 animate-in fade-in zoom-in duration-500">
                <div class="w-24 h-24 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="party-popper" class="w-12 h-12"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-900 leading-tight">Feedback Received!</h1>
                <p class="text-slate-500 text-lg">Thank you for helping us improve. Your insights for <span class="font-bold text-indigo-600">{{ workshop.workshop_name }}</span> are invaluable.</p>
                <div class="pt-6">
                    <a href="/" class="inline-flex items-center px-8 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">
                        Return Home
                    </a>
                </div>
            </div>
        </template>

        <!-- Feedback Wizard -->
        <template x-if="!submitted">
            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden min-h-[550px] flex flex-col">
                
                <!-- Progress Header -->
                <div class="px-8 pt-8 pb-4">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                                <i data-lucide="message-square" class="w-6 h-6"></i>
                            </div>
                            <h2 class="text-xl font-black text-slate-900 tracking-tight">Workshop Feedback</h2>
                        </div>
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest" x-text="`Step ${step} of ${totalSteps}`"></span>
                    </div>
                    <!-- Progress Bar -->
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-600 transition-all duration-500" :style="`width: ${(step / totalSteps) * 100}%`"></div>
                    </div>
                </div>

                <form method="POST" id="feedbackForm" class="flex-grow flex flex-col">
                    {% csrf_token %}
                    
                    <div class="p-8 md:p-12 flex-grow">
                        <!-- Step 1: Overall Impression -->
                        <div x-show="step === 1" x-transition class="space-y-8">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Session Highlights</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_1 }}</h3>
                                <textarea name="question_1_response" rows="3" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all text-slate-700 font-medium bg-slate-50/50" placeholder="Type your response..." required></textarea>
                            </div>

                            <div class="space-y-6">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Session Quality</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_2 }}</h3>
                                <div class="grid grid-cols-5 gap-3">
                                    <template x-for="val in ['Excellent', 'Good', 'Average', 'Poor', 'Bad']">
                                        <label class="cursor-pointer group">
                                            <input type="radio" name="question_2_response" :value="val" class="sr-only" required>
                                            <div class="flex flex-col items-center p-3 rounded-2xl border-2 border-slate-50 group-hover:border-indigo-100 group-hover:bg-indigo-50/30 transition-all peer-checked:bg-indigo-50 peer-checked:border-indigo-500 bg-slate-50/50">
                                                <span class="text-3xl mb-1 filter grayscale opacity-50 transition-all group-hover:filter-none group-hover:opacity-100 peer-checked:filter-none peer-checked:opacity-100" 
                                                      x-text="val === 'Excellent' ? '😍' : (val === 'Good' ? '😁' : (val === 'Average' ? '😶' : (val === 'Poor' ? '🙁' : '😡')))"></span>
                                                <span class="text-[10px] font-black uppercase text-slate-400" x-text="val"></span>
                                            </div>
                                        </label>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Step 2: Quality & Ratings -->
                        <div x-show="step === 2" x-transition class="space-y-8">
                            <div class="space-y-4 text-center">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Star Rating</label>
                                <h3 class="text-xl font-bold text-slate-800">{{ feedback_question.question_3 }}</h3>
                                <div class="flex items-center justify-center space-x-3 py-4">
                                    <template x-for="i in 5">
                                        <button type="button" @click="setQ3(i)" class="transition-transform active:scale-95 outline-none focus:outline-none">
                                            <i data-lucide="star" :class="i <= q3_stars ? 'text-amber-400 fill-amber-400' : 'text-slate-200'" class="w-12 h-12 pointer-events-none"></i>
                                        </button>
                                    </template>
                                    <input type="hidden" name="question_3_response" id="q3_val">
                                </div>
                            </div>

                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Critical Feedback</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_4 }}</h3>
                                <textarea name="question_4_response" rows="3" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all text-slate-700 font-medium bg-slate-50/50" placeholder="How can we improve?" required></textarea>
                            </div>
                        </div>

                        <!-- Step 3: Knowledge & Satisfaction -->
                        <div x-show="step === 3" x-transition class="space-y-8">
                             <div class="space-y-4">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Knowledge Gain</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_5 }}</h3>
                                <div class="grid grid-cols-1 gap-2">
                                    <template x-for="level in ['Not Knowledgeable', 'Slightly Knowledgeable', 'Moderately Knowledgeable', 'Very Knowledgeable', 'Extremely Knowledgeable']">
                                        <button type="button" @click="setQ5(level)" 
                                                class="flex items-center justify-between p-4 rounded-xl border-2 transition-all text-left"
                                                :class="q5_level === level ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-slate-50 border-slate-50 text-slate-600 hover:border-slate-200'">
                                            <span class="text-sm font-bold" x-text="level"></span>
                                            <div class="flex space-x-1 opacity-50" :class="q5_level === level ? 'text-white' : 'text-amber-400'">
                                                <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                                            </div>
                                        </button>
                                    </template>
                                    <input type="hidden" name="question_5_response" id="q5_val">
                                </div>
                            </div>

                            <div class="space-y-4">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Satisfaction Scale</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_7 }}</h3>
                                <div class="grid grid-cols-2 md:grid-cols-5 gap-2">
                                    <template x-for="val in ['Very Dissatisfied', 'Dissatisfied', 'Neutral', 'Satisfied', 'Very Satisfied']">
                                        <button type="button" @click="setQ7(val)" 
                                                class="px-2 py-3 rounded-xl border-2 text-[10px] font-black uppercase transition-all"
                                                :class="q7_scale === val ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-400 hover:border-slate-200'"
                                                x-text="val">
                                        </button>
                                    </template>
                                    <input type="hidden" name="question_7_response" id="q7_val">
                                </div>
                            </div>
                        </div>

                        <!-- Step 4: Final Thoughts -->
                        <div x-show="step === 4" x-transition class="space-y-8">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Facilitator Review</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_6 }}</h3>
                                <textarea name="question_6_response" rows="2" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all text-slate-700 font-medium bg-slate-50/50" required placeholder="Type your response..."></textarea>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Personal Growth</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_8 }}</h3>
                                <textarea name="question_8_response" rows="2" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all text-slate-700 font-medium bg-slate-50/50" required placeholder="Type your response..."></textarea>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-400 uppercase tracking-wider italic">Grand Finale</label>
                                <h3 class="text-xl font-bold text-slate-800 leading-tight">{{ feedback_question.question_9 }}</h3>
                                <textarea name="question_9_response" rows="2" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all text-slate-700 font-medium bg-slate-50/50" required placeholder="General comments..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="p-8 border-t border-slate-50 bg-slate-50/20 flex gap-4">
                        <button type="button" @click="step--" x-show="step > 1" class="flex-grow py-4 bg-white border border-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-50 transition-all">Back</button>
                        <button type="button" @click="step++" x-show="step < totalSteps" class="flex-[2] py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Next Step</button>
                        <button type="submit" x-show="step === totalSteps" class="flex-[2] py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all">Submit Feedback</button>
                    </div>
                </form>
            </div>
        </template>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>

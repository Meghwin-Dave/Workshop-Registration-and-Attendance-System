{% extends 'base_new.html' %}
{% load static %}

{% block title %}QR Scanner | {{ workshop_name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8" x-data="{ 
    scanning: false, 
    lastResult: '', 
    status: 'idle',
    statusMsg: '',
    
    showStatus(type, msg) {
        this.status = type;
        this.statusMsg = msg;
        if (type === 'success') {
            setTimeout(() => { if(this.status === 'success') { this.status = 'idle'; this.statusMsg = ''; } }, 3000);
        }
    }
}" x-init="lucide.createIcons()">

    <!-- Header -->
    <div class="text-center space-y-4">
        <div class="flex justify-center">
            <a href="{% url 'live_dashboard' workshop_id %}"
                class="inline-flex items-center px-4 py-2 text-xs font-bold text-primary-600 bg-primary-50 rounded-xl hover:bg-primary-100 border border-primary-100 transition-all">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5 mr-2"></i>
                Back to Dashboard
            </a>
        </div>
        <div class="space-y-2">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">QR Scanner</h1>
            <p class="text-slate-500 font-medium">{{ workshop_name }}</p>
        </div>
    </div>

    <!-- Scanner Container -->
    <div
        class="bg-white rounded-[2.5rem] border border-slate-100 shadow-2xl shadow-slate-200/50 overflow-hidden relative">
        <!-- Scanner Surface -->
        <div class="w-full aspect-square bg-slate-950 relative overflow-hidden group">
            <!-- The actual camera feed container managed by html5-qrcode -->
            <div id="reader" class="absolute inset-0 z-0"></div>

            <!-- Inactive State -->
            <div x-show="!scanning"
                class="absolute inset-0 z-10 flex flex-col items-center justify-center text-slate-600 bg-slate-900">
                <div class="p-6 rounded-full bg-slate-800/50 mb-4">
                    <i data-lucide="camera-off" class="w-10 h-10 text-slate-400"></i>
                </div>
                <p class="text-xs font-black uppercase tracking-widest text-slate-500">Camera Feed Inactive</p>
            </div>

            <!-- Scanning Overlay Animation -->
            <div x-show="scanning" class="absolute inset-0 pointer-events-none z-20" x-cloak>
                <div class="absolute inset-0 border-[40px] border-black/20"></div>
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border-2 border-primary-500/50 rounded-3xl">
                    <div
                        class="absolute top-0 left-0 w-full h-0.5 bg-primary-400 shadow-[0_0_15px_#38bdf8] animate-[scan_2.5s_infinite]">
                    </div>
                </div>
                <!-- Corner Frames -->
                <div
                    class="absolute top-[20%] left-[20%] w-8 h-8 border-t-4 border-l-4 border-primary-500 rounded-tl-xl opacity-50">
                </div>
                <div
                    class="absolute top-[20%] right-[20%] w-8 h-8 border-t-4 border-r-4 border-primary-500 rounded-tr-xl opacity-50">
                </div>
                <div
                    class="absolute bottom-[20%] left-[20%] w-8 h-8 border-b-4 border-l-4 border-primary-500 rounded-bl-xl opacity-50">
                </div>
                <div
                    class="absolute bottom-[20%] right-[20%] w-8 h-8 border-b-4 border-r-4 border-primary-500 rounded-br-xl opacity-50">
                </div>
            </div>
        </div>

        <!-- Controls & Status -->
        <div class="p-8 space-y-6">
            <div class="flex justify-center">
                <button id="startButton" @click="startScanner($data)" x-show="!scanning"
                    class="px-8 py-4 bg-primary-600 text-white rounded-2xl font-bold shadow-xl shadow-primary-200 hover:bg-primary-700 transition-all flex items-center group">
                    <i data-lucide="camera" class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform"></i>
                    Initialize Scanner
                </button>
                <button id="stopButton" @click="stopScanner($data)" x-show="scanning"
                    class="px-8 py-4 bg-rose-500 text-white rounded-2xl font-bold shadow-xl shadow-rose-200 hover:bg-rose-600 transition-all flex items-center"
                    x-cloak>
                    <i data-lucide="square" class="w-5 h-5 mr-3"></i>
                    Stop Scanning
                </button>
            </div>

            <!-- Feedback Messages -->
            <div x-show="statusMsg" x-transition class="p-4 rounded-2xl flex items-center space-x-3 transition-all"
                :class="{
                     'bg-emerald-50 text-emerald-700 border border-emerald-100': status === 'success',
                     'bg-rose-50 text-rose-700 border border-rose-100': status === 'error',
                     'bg-amber-50 text-amber-700 border border-amber-100': status === 'warning',
                     'bg-slate-50 text-slate-600 border border-slate-100': status === 'idle'
                 }" x-cloak>
                <div class="p-2 rounded-full bg-white/50">
                    <i :data-lucide="status === 'success' ? 'check' : (status === 'error' ? 'x-circle' : 'info')"
                        class="w-4 h-4"></i>
                </div>
                <p class="text-sm font-bold" x-text="statusMsg"></p>
            </div>

            <!-- Result Log (Last Scan) -->
            <div class="pt-6 border-t border-slate-50">
                <div class="flex items-center justify-between mb-3 px-1">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Activity Log</span>
                    <span class="w-2 h-2 rounded-full"
                        :class="scanning ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'"></span>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between border border-slate-100">
                    <span class="text-sm font-mono text-slate-600 truncate"
                        x-text="lastResult || 'Waiting for signal...'"></span>
                    <i data-lucide="hash" class="w-4 h-4 text-slate-300"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Back Link -->
    <div class="flex justify-center pb-8">
        <a href="{% url 'show_visitors' workshop_id %}"
            class="flex items-center text-slate-400 hover:text-slate-900 transition-colors font-bold text-xs uppercase tracking-widest">
            <i data-lucide="arrow-left" class="w-3 h-3 mr-2"></i>
            Exit Scanner
        </a>
    </div>
</div>

<style>
    @keyframes scan {

        0%,
        100% {
            top: 20%;
            opacity: 0;
        }

        10% {
            opacity: 1;
        }

        90% {
            opacity: 1;
        }

        100% {
            top: 80%;
            opacity: 0;
        }
    }

    #reader video {
        object-fit: cover !important;
        width: 100% !important;
        height: 100% !important;
    }

    #reader {
        border: none !important;
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
    let html5QrCode = null;
    const workshopId = "{{ workshop_id }}";

    async function startScanner(app) {
        console.log("Initialize Scanner clicked");
        if (!app) {
            console.error("App state missing");
            alert("Scanner Error: UI state not found.");
            return;
        }

        app.showStatus('idle', 'Initializing...');

        if (typeof Html5Qrcode === 'undefined') {
            app.showStatus('error', 'Scanner library failed to load.');
            return;
        }

        if (!html5QrCode) {
            try {
                html5QrCode = new Html5Qrcode('reader');
            } catch (e) {
                app.showStatus('error', 'Failed to bind scanner.');
                return;
            }
        }

        const config = {
            fps: 20,
            qrbox: (viewfinderWidth, viewfinderHeight) => {
                let minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                return { width: Math.floor(minEdge * 0.7), height: Math.floor(minEdge * 0.7) };
            },
            aspectRatio: 1.0
        };

        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                    throw new Error("SECURITY: Camera requires HTTPS.");
                }
                throw new Error("NOT SUPPORTED: Browser blocks camera.");
            }

            app.scanning = true;
            await html5QrCode.start({ facingMode: "environment" }, config, (text) => onScanSuccess(text, app));
            app.showStatus('idle', 'Ready to scan');
        } catch (err) {
            console.warn("Primary camera failed:", err.message);
            try {
                const cameras = await Html5Qrcode.getCameras();
                if (cameras && cameras.length > 0) {
                    await html5QrCode.start(cameras[0].id, config, (text) => onScanSuccess(text, app));
                    app.showStatus('idle', 'Ready to scan');
                } else {
                    throw new Error(err.message || "No camera detected.");
                }
            } catch (fallbackErr) {
                app.showStatus('error', fallbackErr.message);
                app.scanning = false;
            }
        }
    }

    function onScanSuccess(decodedText, app) {
        if (app.lastResult === decodedText) return;
        
        app.lastResult = decodedText;
        app.showStatus('success', 'VALIDATING...');
        
        // Extract the UUID regardless of the domain in the QR code
        if (decodedText.includes('verify_visitor')) {
            const uuid = decodedText.split('/').filter(Boolean).pop();
            // Always redirect to the current domain using a relative path
            window.location.href = `/verify_visitor/${uuid}/${workshopId}`;
        } else {
            app.showStatus('warning', 'Unknown QR detected');
        }
    }

    function stopScanner(app) {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                if (app) {
                    app.scanning = false;
                    app.showStatus('idle', 'Scanner paused');
                }
            }).catch(e => console.error(e));
        }
    }
</script>
{% endblock %}

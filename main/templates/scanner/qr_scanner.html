{% extends 'base_new.html' %}
{% load static %}

{% block title %}QR Scanner | {{ workshop_name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8" x-data="{ 
    scanning: false, 
    lastResult: '', 
    status: 'idle',
    statusMsg: '',
    
    showStatus(type, msg) {
        this.status = type;
        this.statusMsg = msg;
        if (type === 'success') {
            setTimeout(() => { if(this.status === 'success') { this.status = 'idle'; this.statusMsg = ''; } }, 3000);
        }
    }
}" x-init="lucide.createIcons()">
    
    <!-- Header -->
    <div class="text-center space-y-4">
        <div class="flex justify-center">
            <a href="{% url 'live_dashboard' workshop_id %}" class="inline-flex items-center px-4 py-2 text-xs font-bold text-primary-600 bg-primary-50 rounded-xl hover:bg-primary-100 border border-primary-100 transition-all">
                <i data-lucide="arrow-left" class="w-3.5 h-3.5 mr-2"></i>
                Back to Dashboard
            </a>
        </div>
        <div class="space-y-2">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">QR Scanner</h1>
            <p class="text-slate-500 font-medium">{{ workshop_name }}</p>
        </div>
    </div>

    <!-- Scanner Container -->
    <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-2xl shadow-slate-200/50 overflow-hidden relative">
        <!-- Scanner Surface -->
        <div id="reader" class="w-full aspect-square bg-slate-900 flex items-center justify-center relative">
            <template x-if="!scanning">
                <div class="flex flex-col items-center text-slate-500 animate-pulse">
                    <i data-lucide="camera" class="w-12 h-12 mb-4"></i>
                    <p class="text-sm font-bold uppercase tracking-widest">Camera Inactive</p>
                </div>
            </template>
            
            <!-- Scanning Overlay Animation -->
            <div x-show="scanning" class="absolute inset-0 pointer-events-none z-10">
                <div class="absolute inset-0 border-[40px] border-black/40"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border-2 border-primary-500 rounded-3xl shadow-[0_0_20px_rgba(14,165,233,0.5)]">
                    <div class="absolute top-0 left-0 w-full h-1 bg-primary-500/50 shadow-[0_0_15px_#0ea5e9] animate-[scan_2s_infinite]"></div>
                </div>
            </div>
        </div>

        <!-- Controls & Status -->
        <div class="p-8 space-y-6">
            <div class="flex justify-center">
                <button id="startButton" @click="startScanner(); scanning = true" x-show="!scanning" class="px-8 py-4 bg-primary-600 text-white rounded-2xl font-bold shadow-xl shadow-primary-200 hover:bg-primary-700 transition-all flex items-center">
                    <i data-lucide="play" class="w-5 h-5 mr-3"></i>
                    Initialize Camera
                </button>
                <button id="stopButton" @click="stopScanner(); scanning = false" x-show="scanning" class="px-8 py-4 bg-rose-500 text-white rounded-2xl font-bold shadow-xl shadow-rose-200 hover:bg-rose-600 transition-all flex items-center">
                    <i data-lucide="square" class="w-5 h-5 mr-3"></i>
                    Stop Scanning
                </button>
            </div>

            <!-- Feedback Messages -->
            <div x-show="statusMsg" x-transition class="p-4 rounded-2xl flex items-center space-x-3 transition-all"
                 :class="{
                     'bg-emerald-50 text-emerald-700 border border-emerald-100': status === 'success',
                     'bg-rose-50 text-rose-700 border border-rose-100': status === 'error',
                     'bg-amber-50 text-amber-700 border border-amber-100': status === 'warning'
                 }">
                <i :data-lucide="status === 'success' ? 'check-circle' : (status === 'error' ? 'alert-circle' : 'info')" class="w-5 h-5 flex-shrink-0"></i>
                <p class="text-sm font-semibold" x-text="statusMsg"></p>
            </div>

            <!-- Result Log (Last Scan) -->
            <div class="pt-6 border-t border-slate-50">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 text-center">Last Result</p>
                <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between">
                    <span class="text-sm font-mono text-slate-600 truncate" x-text="lastResult || 'No code detected yet...'"></span>
                    <i data-lucide="qr-code" class="w-4 h-4 text-slate-300"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Back Link -->
    <div class="flex justify-center">
        <a href="{% url 'show_visitors' workshop_id %}" class="flex items-center text-slate-500 hover:text-slate-900 transition-colors font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
            Back to Attendee List
        </a>
    </div>
</div>

<style>
    @keyframes scan {
        0%, 100% { top: 0; }
        50% { top: 100%; }
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
    let html5QrCode = null;
    const workshopId = "{{ workshop_id }}";
    
    function startScanner() {
        const app = document.querySelector('[x-data]').__x.$data;
        app.showStatus('idle', 'Warming up camera...');

        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode('reader');
        }

        const config = {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        const cameraConfig = { facingMode: 'environment' };

        html5QrCode.start(cameraConfig, config, (decodedText) => {
            if (app.lastResult === decodedText) return;
            
            app.lastResult = decodedText;
            app.showStatus('success', 'Ticket detected! Verifying...');
            
            // Navigate to verification URL
            // Matches ticket URL format: /verify_visitor/<uuid>/<id>
            if (decodedText.includes('verify_visitor')) {
                window.open(decodedText, '_blank');
            } else if (decodedText.startsWith('http')) {
                 window.open(decodedText, '_blank');
            } else {
                app.showStatus('warning', 'Non-system QR detected: ' + decodedText);
            }
        }, (error) => {
            // Silence debug errors
        }).catch(err => {
            app.showStatus('error', 'Camera Error: ' + err.message);
            app.scanning = false;
        });
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                const app = document.querySelector('[x-data]').__x.$data;
                app.showStatus('idle', 'Scanner paused.');
            });
        }
    }
</script>
{% endblock %}

<header class="flex items-center justify-between h-16 px-6 bg-white border-b border-slate-200 shrink-0">
    <div class="flex items-center">
        <button @click="sidebarOpen = !sidebarOpen" class="p-2 mr-4 text-slate-500 transition-colors rounded-lg hover:bg-slate-50 focus:outline-none">
            <i data-lucide="menu" class="w-5 h-5" x-show="!sidebarOpen"></i>
            <i data-lucide="x" class="w-5 h-5" x-show="sidebarOpen"></i>
        </button>
        
        <div class="hidden md:flex items-center px-4 py-2 space-x-2 text-sm text-slate-500 bg-slate-50 rounded-full border border-slate-200">
            <i data-lucide="search" class="w-4 h-4"></i>
            <input type="text" placeholder="Search visitors, workshops..." class="bg-transparent border-none focus:ring-0 w-64 placeholder:text-slate-400">
        </div>
    </div>

    <div class="flex items-center space-x-4">
        <!-- Notifications -->
        <button class="relative p-2 text-slate-500 transition-colors rounded-lg hover:bg-slate-50 focus:outline-none">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Profile -->
        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center space-x-2 p-1.5 focus:outline-none transition-colors rounded-xl hover:bg-slate-50">
                <div class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white font-bold shadow-sm">
                    {{ request.user.email|slice:":1"|upper }}
                </div>
                <div class="hidden sm:block text-left">
                    <p class="text-xs font-semibold text-slate-700 leading-tight">Administrator</p>
                    <p class="text-[10px] text-slate-400 leading-tight">Admin</p>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform" :class="{ 'rotate-180': open }"></i>
            </button>
            
            <div x-show="open" 
                 x-cloak
                 @click.away="open = false"
                 class="absolute right-0 mt-2 w-48 py-2 bg-white rounded-xl shadow-xl border border-slate-100 ring-1 ring-black ring-opacity-5 focus:outline-none transform transition-all"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95">
                <a href="#" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Your Profile</a>
                <a href="#" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Settings</a>
                <hr class="my-1 border-slate-100">
                <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">Logout</a>
            </div>
        </div>
    </div>
</header>
